[package]
name = "sccp-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "=0.4.0"
psm = "=0.1.26"
substrate-bip39 = "=0.4.5"
sccp = { path = "..", features = ["std", "fuzzing"] }

[[bin]]
name = "evm_proof_helpers"
path = "fuzz_targets/evm_proof_helpers.rs"
test = false
doc = false
bench = false

[[bin]]
name = "tron_proof_helpers"
path = "fuzz_targets/tron_proof_helpers.rs"
test = false
doc = false
bench = false

[[bin]]
name = "bsc_header_helpers"
path = "fuzz_targets/bsc_header_helpers.rs"
test = false
doc = false
bench = false

[workspace]
members = ["."]

[patch."https://github.com/paritytech/substrate.git"]
frame-support = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
frame-support-procedural = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
frame-support-procedural-tools = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
frame-support-procedural-tools-derive = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
frame-system = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
sp-api = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
sp-api-proc-macro = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
sp-application-crypto = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
sp-arithmetic = { path = "../../../vendor/sp-arithmetic" }
sp-core = { path = "../../../vendor/sp-core" }
sp-core-hashing = { path = "../../../vendor/sp-core/hashing" }
sp-core-hashing-proc-macro = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
sp-debug-derive = { path = "../../../vendor/debug-derive" }
sp-inherents = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
sp-io = { path = "../../../vendor/sp-io" }
sp-keystore = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
sp-panic-handler = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
sp-runtime-interface = { path = "../../../vendor/runtime-interface" }
sp-staking = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
sp-state-machine = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
sp-std = { path = "../../../vendor/std" }
sp-storage = { path = "../../../vendor/storage" }
sp-trie = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
sp-version = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
sp-version-proc-macro = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }
sp-weights = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3" }

[patch."https://github.com/sora-xor/substrate.git"]
sp-arithmetic = { path = "../../../vendor/sp-arithmetic" }
sp-debug-derive = { path = "../../../vendor/debug-derive" }
sp-core = { path = "../../../vendor/sp-core" }
sp-core-hashing = { path = "../../../vendor/sp-core/hashing" }
sp-externalities = { path = "../../../vendor/externalities" }
sp-io = { path = "../../../vendor/sp-io" }
sp-runtime-interface = { path = "../../../vendor/runtime-interface" }
sp-std = { path = "../../../vendor/std" }
sp-storage = { path = "../../../vendor/storage" }
sp-tracing = { path = "../../../vendor/tracing" }
sp-wasm-interface = { path = "../../../vendor/wasm-interface" }
