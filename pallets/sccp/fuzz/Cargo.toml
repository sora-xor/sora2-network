[package]
name = "sccp-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "=0.4.0"
psm = "=0.1.26"
sccp = { path = "..", features = ["std", "fuzzing"] }

[[bin]]
name = "evm_proof_helpers"
path = "fuzz_targets/evm_proof_helpers.rs"
test = false
doc = false
bench = false

[[bin]]
name = "tron_proof_helpers"
path = "fuzz_targets/tron_proof_helpers.rs"
test = false
doc = false
bench = false

[workspace]
members = ["."]
