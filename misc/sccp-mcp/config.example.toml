[limits]
max_call_bytes = 131072
max_proof_bytes = 1048576
max_request_bytes = 4194304

[policy]
allow_tools = []
deny_tools = []

# SORA (Substrate)
[networks.sora_testnet]
kind = "sora"
rpc_url = "http://127.0.0.1:9933"
ws_url = "ws://127.0.0.1:9944"
ss58_prefix = 69
sccp_pallet_index = 0
block_number_bytes = 4
notes = "Local or testnet SORA node"

[networks.sora_mainnet]
kind = "sora"
rpc_url = "http://127.0.0.1:9933"
ss58_prefix = 69
sccp_pallet_index = 0
block_number_bytes = 4
notes = "Replace with production endpoint"

