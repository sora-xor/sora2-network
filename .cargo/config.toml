[profile.dev]
debug = false

[profile.release]
lto = "thin"
opt-level = 's'

[profile.test]
debug = false

[env]
MACOSX_DEPLOYMENT_TARGET = "11.0"
LLVM_CONFIG_PATH = "/opt/homebrew/opt/llvm/bin/llvm-config"
LIBCLANG_PATH = "/opt/homebrew/opt/llvm/lib"
DYLD_FALLBACK_LIBRARY_PATH = "/opt/homebrew/opt/llvm/lib"
