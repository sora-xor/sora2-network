[package]
name = "solana-account-proof-geyser"
version = "0.1.0"
edition = "2021"
license = "BSD-4-Clause"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
anyhow = "1.0"
blake3 = "1.5.5"
borsh = { version = "1.6", features = ["derive"] }
crossbeam-channel = "0.5"
log = "0.4"
rayon = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
agave-geyser-plugin-interface = "4.0.0-beta.3"
solana-accounts-db = "3.0.0"
solana-logger = "3.0.0"
solana-runtime = "3.0.0"
solana-sdk = "3.0.0"
tokio = { version = "1", features = ["net", "rt-multi-thread", "sync", "io-util"] }
