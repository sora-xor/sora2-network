[package]
name = "solana-live-burn-flow"
version = "0.1.0"
edition = "2021"
license = "BSD-4-Clause"

[dependencies]
anyhow = "1.0"
borsh = "0.10"
clap = { version = "4.5", features = ["derive"] }
hex = "0.4"
libsecp256k1 = "0.7"
serde_json = "1.0"
solana-client = "1.14.20"
solana-sdk = "1.14.20"
spl-token = { version = "3.5.0", features = ["no-entrypoint"] }
tiny-keccak = { version = "2", features = ["keccak"] }
sccp-sol = { path = "../.." }
sccp-sol-program = { path = "../../program" }
sccp-sol-verifier-program = { path = "../../verifier-program" }
