[package]
name = "frame-storage-access-test-runtime"
description = "A runtime for testing storage access on block validation"
version = "0.6.0"
edition = "2021"
build = "build.rs"
license = "Apache-2.0"
publish = false

[dependencies]
codec = { package = "parity-scale-codec", version = "3.6.5", default-features = false, features = ["derive"] }
cumulus-pallet-parachain-system = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3", default-features = false, optional = true }
sp-core = { workspace = true }
sp-runtime = { workspace = true }
sp-state-machine = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3", default-features = false }
sp-trie = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3", default-features = false }

[build-dependencies]
substrate-wasm-builder = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-3", default-features = true, optional = true }

[features]
default = ["std"]
no_std = []
std = [
	"codec/std",
	"cumulus-pallet-parachain-system/std",
	"sp-core/std",
	"sp-runtime/std",
	"sp-state-machine/std",
	"sp-trie/std",
	"substrate-wasm-builder",
]
runtime-benchmarks = [
	"cumulus-pallet-parachain-system/runtime-benchmarks",
	"sp-runtime/runtime-benchmarks",
]
