[package]
name = "solana-proof-runtime-interface"
version = "0.1.0"
edition = "2021"

[dependencies]
codec = { package = "parity-scale-codec", version = "3", default-features = false, features = ["derive"] }
curve25519-dalek = { version = "4.1.3", default-features = false, optional = true }
sp-runtime-interface = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-2", default-features = false }
sp-std = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2512-2", default-features = false }

bincode = { version = "1.3.3", optional = true }
blake3 = { version = "1.5.1", optional = true }
ed25519-dalek = { version = "2.2.0", default-features = false, features = ["std"], optional = true }
serde = { version = "1.0.217", features = ["derive"], optional = true }
sha2 = { version = "0.10.9", default-features = false, features = ["std"], optional = true }
sha3 = { version = "0.10.8", default-features = false, features = ["std"], optional = true }

[features]
default = ["std"]
std = [
    "codec/std",
    "dep:curve25519-dalek",
    "sp-runtime-interface/std",
    "sp-std/std",
    "dep:bincode",
    "dep:blake3",
    "dep:ed25519-dalek",
    "dep:serde",
    "dep:sha2",
    "dep:sha3",
]
